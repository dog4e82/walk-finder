name: Update walk-finder data

# 매시간 자동 실행 (10분 시점) + 수동 실행도 가능
on:
  schedule:
    - cron: '10 * * * *'   # 매시 10분 (UTC) — 기상청 발표시각 + 약간 여유
  workflow_dispatch:        # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run fetch_data.py
        env:
          SERVICE_KEY: ${{ secrets.SERVICE_KEY }}
          PYTHONIOENCODING: utf-8
          TZ: Asia/Seoul
        run: python fetch_data.py

      - name: Commit and push if data.json changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit."
          else
            git commit -m "🔄 auto-update: data.json $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
            git push
          fi
